server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — toutes les routes Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → hub-backend Railway (même projet)
    location /api/ {
        proxy_pass https://sass-hub-v3-nx-production-f0c6.up.railway.app/api/;
        proxy_set_header Host sass-hub-v3-nx-production-f0c6.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_cookie_path /api /api;
    }
}
